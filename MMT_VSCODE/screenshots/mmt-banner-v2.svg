<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f0a"/>
      <stop offset="50%" style="stop-color:#2d1509"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="pillOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="50%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="pillRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="pillGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="pillPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  <rect width="900" height="300" fill="url(#glowCenter)"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#ea580c" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ea580c" stroke-width="2" fill="none" opacity="0.7">
    <path d="M20,20 L20,40 M20,20 L40,20"/>
    <path d="M880,20 L880,40 M880,20 L860,20"/>
    <path d="M20,280 L20,260 M20,280 L40,280"/>
    <path d="M880,280 L880,260 M880,280 L860,280"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#titleGrad)" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== LEFT SIDE PILLS (more, spread out) ===== -->
  <!-- Pill 1 orange large -->
  <g filter="url(#glow)">
    <rect x="22" y="45" width="52" height="20" rx="10" fill="url(#pillOrange)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <line x1="48" y1="45" x2="48" y2="65" stroke="rgba(0,0,0,0.25)" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 2 red -->
  <g>
    <rect x="42" y="98" width="40" height="16" rx="8" fill="url(#pillRed)" opacity="0.72">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <line x1="62" y1="98" x2="62" y2="114" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 3 green -->
  <g filter="url(#glow)">
    <rect x="18" y="152" width="56" height="22" rx="11" fill="url(#pillGreen)" opacity="0.68">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="5s" repeatCount="indefinite"/>
    </rect>
    <line x1="46" y1="152" x2="46" y2="174" stroke="rgba(0,0,0,0.2)" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 4 blue small -->
  <g>
    <rect x="50" y="210" width="36" height="14" rx="7" fill="url(#pillBlue)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,9;0,0" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="68" y1="210" x2="68" y2="224" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,9;0,0" dur="3.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 5 purple -->
  <g filter="url(#glow)">
    <rect x="25" y="255" width="44" height="17" rx="8.5" fill="url(#pillPurple)" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="47" y1="255" x2="47" y2="272" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Cross medical symbol left -->
  <g fill="#ea580c" opacity="0.3">
    <rect x="88" y="68" width="12" height="4" rx="2"/>
    <rect x="92" y="64" width="4" height="12" rx="2"/>
  </g>
  <g fill="#22c55e" opacity="0.25">
    <rect x="88" y="190" width="12" height="4" rx="2"/>
    <rect x="92" y="186" width="4" height="12" rx="2"/>
  </g>

  <!-- ===== RIGHT SIDE PILLS ===== -->
  <!-- Pill 1 green -->
  <g filter="url(#glow)">
    <rect x="826" y="42" width="52" height="20" rx="10" fill="url(#pillGreen)" opacity="0.72">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,9;0,0" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="852" y1="42" x2="852" y2="62" stroke="rgba(0,0,0,0.2)" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,9;0,0" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 2 orange -->
  <g>
    <rect x="816" y="98" width="44" height="17" rx="8.5" fill="url(#pillOrange)" opacity="0.78">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <line x1="838" y1="98" x2="838" y2="115" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="3.2s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 3 red -->
  <g filter="url(#glow)">
    <rect x="830" y="152" width="48" height="19" rx="9.5" fill="url(#pillRed)" opacity="0.65">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="854" y1="152" x2="854" y2="171" stroke="rgba(0,0,0,0.2)" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="5.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 4 blue -->
  <g>
    <rect x="820" y="210" width="38" height="15" rx="7.5" fill="url(#pillBlue)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <line x1="839" y1="210" x2="839" y2="225" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pill 5 purple -->
  <g filter="url(#glow)">
    <rect x="828" y="255" width="46" height="18" rx="9" fill="url(#pillPurple)" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,7;0,0" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <line x1="851" y1="255" x2="851" y2="273" stroke="rgba(0,0,0,0.2)" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,7;0,0" dur="3.8s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Cross medical symbol right -->
  <g fill="#ea580c" opacity="0.3">
    <rect x="800" y="68" width="12" height="4" rx="2"/>
    <rect x="804" y="64" width="4" height="12" rx="2"/>
  </g>
  <g fill="#22c55e" opacity="0.25">
    <rect x="800" y="190" width="12" height="4" rx="2"/>
    <rect x="804" y="186" width="4" height="12" rx="2"/>
  </g>

  <!-- ===== HEARTBEAT LINES ===== -->
  <g transform="translate(115,150)">
    <polyline points="0,0 18,0 28,-28 36,28 46,0 64,0 72,-38 80,38 90,0 145,0"
      fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.45" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="220;0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="220;0" dur="2s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <g transform="translate(640,150)">
    <polyline points="0,0 18,0 28,-28 36,28 46,0 64,0 72,-38 80,38 90,0 145,0"
      fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.45" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="220;0" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="220;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- ===== CENTER GLOW ===== -->
  <ellipse cx="450" cy="145" rx="210" ry="105" fill="#ea580c" opacity="0.04">
    <animate attributeName="rx" values="190;230;190" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ===== PULSE RINGS ===== -->
  <circle cx="450" cy="145" r="60" fill="none" stroke="#ea580c" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="55;125" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="145" r="60" fill="none" stroke="#ea580c" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="55;160" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="145" r="60" fill="none" stroke="#fb923c" stroke-width="0.4" opacity="0">
    <animate attributeName="r" values="55;190" dur="3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== MMT TITLE ===== -->
  <text x="450" y="115" text-anchor="middle" font-family="Arial Black,sans-serif"
    font-size="74" font-weight="900" fill="#ea580c" opacity="0.25" filter="url(#softglow)">MMT</text>
  <text x="450" y="115" text-anchor="middle" font-family="Arial Black,sans-serif"
    font-size="74" font-weight="900" fill="none" stroke="url(#titleGrad)" stroke-width="2"
    filter="url(#textglow)">
    MMT
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="115" text-anchor="middle" font-family="Arial Black,sans-serif"
    font-size="74" font-weight="900" fill="none" stroke="#fb923c" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="450" y="140" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="11" letter-spacing="6" fill="rgba(255,255,255,0.55)" font-weight="300">
    MEDICATION MANAGEMENT TOOL
  </text>

  <!-- Divider -->
  <line x1="285" y1="152" x2="615" y2="152" stroke="url(#titleGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- ===== TECH STACK PILLS ===== -->
  <rect x="270" y="160" width="58" height="18" rx="9" fill="rgba(234,88,12,0.1)" stroke="rgba(234,88,12,0.4)" stroke-width="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="299" y="172.5" text-anchor="middle" font-family="Courier New,monospace"
    font-size="9" letter-spacing="1.5" fill="rgba(234,88,12,0.9)">FLASK</text>

  <rect x="336" y="160" width="74" height="18" rx="9" fill="rgba(234,88,12,0.1)" stroke="rgba(234,88,12,0.4)" stroke-width="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="373" y="172.5" text-anchor="middle" font-family="Courier New,monospace"
    font-size="9" letter-spacing="1.5" fill="rgba(234,88,12,0.9)">MONGODB</text>

  <rect x="418" y="160" width="98" height="18" rx="9" fill="rgba(234,88,12,0.1)" stroke="rgba(234,88,12,0.4)" stroke-width="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="467" y="172.5" text-anchor="middle" font-family="Courier New,monospace"
    font-size="9" letter-spacing="1.5" fill="rgba(234,88,12,0.9)">APSCHEDULER</text>

  <rect x="524" y="160" width="92" height="18" rx="9" fill="rgba(234,88,12,0.1)" stroke="rgba(234,88,12,0.4)" stroke-width="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="570" y="172.5" text-anchor="middle" font-family="Courier New,monospace"
    font-size="9" letter-spacing="1.5" fill="rgba(234,88,12,0.9)">GMAIL SMTP</text>

  <!-- ===== ADHERENCE RING ===== -->
  <circle cx="450" cy="222" r="0" fill="none" stroke="rgba(234,88,12,0.1)" stroke-width="4"/>
  <!-- Ring arc 87% -->
  <circle cx="450" cy="222" r="28" fill="none" stroke="rgba(234,88,12,0.12)" stroke-width="4"/>
  <circle cx="450" cy="222" r="28" fill="none" stroke="url(#titleGrad)" stroke-width="4"
    stroke-linecap="round" stroke-dasharray="152 176" transform="rotate(-90 450 222)" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 176;152 176" dur="2s" fill="freeze"/>
  </circle>
  <text x="450" y="218" text-anchor="middle" font-family="Courier New,monospace"
    font-size="11" font-weight="700" fill="#ea580c">87%</text>
  <text x="450" y="230" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="6.5" letter-spacing="1.5" fill="rgba(255,255,255,0.3)">ADHERENCE</text>

  <!-- ===== STATS ROW ===== -->
  <line x1="260" y1="258" x2="640" y2="258" stroke="rgba(234,88,12,0.2)" stroke-width="0.8"/>

  <text x="330" y="276" text-anchor="middle" font-family="Courier New,monospace"
    font-size="20" font-weight="700" fill="#ea580c" filter="url(#glow)">1.1B</text>
  <text x="330" y="290" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="7.5" letter-spacing="2" fill="rgba(255,255,255,0.28)">PATIENTS/YR INDIA</text>

  <line x1="400" y1="265" x2="400" y2="292" stroke="rgba(234,88,12,0.2)" stroke-width="0.8"/>

  <text x="450" y="276" text-anchor="middle" font-family="Courier New,monospace"
    font-size="20" font-weight="700" fill="#ea580c" filter="url(#glow)">80M+</text>
  <text x="450" y="290" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="7.5" letter-spacing="2" fill="rgba(255,255,255,0.28)">NON-ADHERENT</text>

  <line x1="505" y1="265" x2="505" y2="292" stroke="rgba(234,88,12,0.2)" stroke-width="0.8"/>

  <text x="568" y="276" text-anchor="middle" font-family="Courier New,monospace"
    font-size="20" font-weight="700" fill="#ea580c" filter="url(#glow)">49%</text>
  <text x="568" y="290" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="7.5" letter-spacing="2" fill="rgba(255,255,255,0.28)">MISS WEEKLY DOSES</text>

  <!-- ===== CORNER BADGES ===== -->
  <text x="28" y="18" font-family="Courier New,monospace" font-size="9" letter-spacing="2" fill="rgba(234,88,12,0.55)">v1.0.0</text>
  <text x="872" y="18" text-anchor="end" font-family="Courier New,monospace" font-size="9" letter-spacing="2" fill="rgba(234,88,12,0.55)">PYTHON 3.12+</text>
  <text x="28" y="295" font-family="Courier New,monospace" font-size="9" letter-spacing="2" fill="rgba(234,88,12,0.4)">MIT LICENSE</text>
  <text x="872" y="295" text-anchor="end" font-family="Courier New,monospace" font-size="9" letter-spacing="2" fill="rgba(234,88,12,0.4)">DARK MODE ◐</text>

  <!-- Bottom label -->
  <text x="450" y="208" text-anchor="middle" font-family="Courier New,monospace"
    font-size="8" letter-spacing="3" fill="rgba(234,88,12,0.45)" font-weight="700">
    Real-Time Adherence Dashboard
    <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
