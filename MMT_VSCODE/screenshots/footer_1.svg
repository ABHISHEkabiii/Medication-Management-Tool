<svg viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:0.8"/>
      <stop offset="30%" style="stop-color:#00c9ff;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#ff4d6d;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d6d;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#00c9ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="900" height="80" fill="#0a0a1a"/>

  <!-- Animated wave 1 -->
  <path fill="url(#waveGrad)" opacity="0.7">
    <animate attributeName="d"
      values="
        M0,40 C150,10 300,70 450,40 C600,10 750,70 900,40 L900,80 L0,80 Z;
        M0,50 C150,20 300,60 450,30 C600,0 750,60 900,50 L900,80 L0,80 Z;
        M0,40 C150,10 300,70 450,40 C600,10 750,70 900,40 L900,80 L0,80 Z
      "
      dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- Animated wave 2 -->
  <path fill="url(#wave2Grad)" opacity="0.5">
    <animate attributeName="d"
      values="
        M0,55 C200,25 400,65 600,45 C750,30 850,55 900,50 L900,80 L0,80 Z;
        M0,45 C200,65 400,35 600,55 C750,65 850,40 900,45 L900,80 L0,80 Z;
        M0,55 C200,25 400,65 600,45 C750,30 850,55 900,50 L900,80 L0,80 Z
      "
      dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Floating pill dots on wave -->
  <circle cx="150" cy="38" r="4" fill="#00c9ff" opacity="0.8">
    <animate attributeName="cy" values="38;28;38" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="35" r="3" fill="#ff4d6d" opacity="0.8">
    <animate attributeName="cy" values="35;45;35" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="42" r="4" fill="#00c9ff" opacity="0.8">
    <animate attributeName="cy" values="42;32;42" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom text -->
  <text x="450" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#7ecfea" opacity="0.6" letter-spacing="2">
    BUILT FOR 80M+ NON-ADHERENT PATIENTS · AUTOMATED CARE · DARK DASHBOARD
  </text>
</svg>
